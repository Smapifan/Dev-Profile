name: Create Profile PR from Issue

# Triggered automatically when a "profile-submission" label is added to an issue.
# The label is applied by GitHub when a user opens an issue using the
# "New Developer Profile" issue form template.
#
# No Personal Access Token is required – the workflow runs entirely with the
# built-in GITHUB_TOKEN (github-actions[bot]).

on:
  issues:
    types: [labeled]

jobs:
  create-profile-pr:
    # Only run when the "profile-submission" label is applied
    if: github.event.label.name == 'profile-submission'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm install js-yaml

      - name: Parse issue body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            function extractField(label) {
              // GitHub issue forms render as "### Label\n\nvalue\n"
              const re = new RegExp(
                '###\\s+' + label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') +
                '\\s*\\n+([\\s\\S]*?)(?=\\n###|$)',
                'i'
              );
              const m = body.match(re);
              if (!m) return '';
              return m[1].replace(/<!--[\s\S]*?-->/g, '').trim();
            }

            const username     = extractField('Username');
            const displayName  = extractField('Display Name');
            const bio          = extractField('Bio').replace(/^_No response_$/i, '');
            const skills       = extractField('Skills').replace(/^_No response_$/i, '');
            const socialsRaw   = extractField('Platform Links').replace(/^_No response_$/i, '');
            const language     = extractField('Preferred Language') || 'en';

            // Validate username
            if (!/^[a-zA-Z0-9_-]{1,40}$/.test(username)) {
              core.setFailed(`Invalid username: "${username}". Use only letters, numbers, hyphens and underscores (max 40 chars).`);
              return;
            }

            // Normalise socials: accept JSON array or newline-separated URLs
            let socialsJson = '[]';
            if (socialsRaw.startsWith('[')) {
              socialsJson = socialsRaw;
            } else if (socialsRaw) {
              const entries = socialsRaw
                .split('\n')
                .map(l => l.trim())
                .filter(Boolean)
                .map(url => JSON.stringify({ type: 'link', url }));
              socialsJson = '[' + entries.join(',') + ']';
            }

            core.setOutput('username',     username);
            core.setOutput('display_name', displayName);
            core.setOutput('bio',          bio);
            core.setOutput('skills',       skills);
            core.setOutput('socials',      socialsJson);
            core.setOutput('language',     language);

            console.log(`Parsed profile submission for username: ${username}`);

      - name: Validate username is unique
        id: validate
        run: |
          USERNAME="${{ steps.parse.outputs.username }}"
          if [ -z "$USERNAME" ]; then
            echo "::error::No username could be parsed from the issue body."
            exit 1
          fi
          if [ -d "profiles/$USERNAME" ]; then
            echo "::error::Profile '$USERNAME' already exists."
            exit 1
          fi
          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"

      - name: Create profile files
        env:
          PROFILE_KEY_SALT: ${{ secrets.PROFILE_KEY_SALT }}
        run: |
          node .github/scripts/create_profile.js \
            --username "${{ steps.validate.outputs.username }}" \
            --name     "${{ steps.parse.outputs.display_name }}" \
            --bio      "${{ steps.parse.outputs.bio }}" \
            --skills   "${{ steps.parse.outputs.skills }}" \
            --socials  "${{ steps.parse.outputs.socials }}" \
            --language "${{ steps.parse.outputs.language }}"

      - name: Create branch and open PR
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="${{ steps.validate.outputs.username }}"
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%S)
          BRANCH="profile/${USERNAME}-${TIMESTAMP}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add "profiles/${USERNAME}/" profiles.yml
          git commit -m "feat: add profile '${USERNAME}' (via issue #${{ github.event.issue.number }})"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "feat: add profile '${USERNAME}'" \
            --body "$(cat <<EOF
          ## New Developer Profile: \`${USERNAME}\`

          This Pull Request was automatically created by **github-actions[bot]** from issue #${{ github.event.issue.number }} – no Personal Access Token required.

          ### Profile details
          - **Username:** \`${USERNAME}\`
          - **Display name:** ${{ steps.parse.outputs.display_name }}
          - **Language:** ${{ steps.parse.outputs.language }}
          - **Submitted via:** Issue #${{ github.event.issue.number }}

          ### Checklist
          - [ ] Username is unique and valid
          - [ ] Bio and links look correct
          - [ ] No sensitive data included

          > The profile key hash is stored in \`profiles/${USERNAME}/profile.yml\`. The raw key was generated server-side and is printed once in the workflow log.
          EOF
          )")

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH"  >> "$GITHUB_OUTPUT"

      - name: Comment on issue with PR link
        uses: actions/github-script@v7
        with:
          script: |
            const prUrl = '${{ steps.create_pr.outputs.pr_url }}';
            const username = '${{ steps.validate.outputs.username }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Profile PR created!**\n\nA branch and Pull Request have been automatically opened by **github-actions[bot]** — no Personal Access Token required.\n\n🔗 **PR:** ${prUrl}\n\nThe maintainer will review and merge your profile. Thank you for submitting, @${username}!`,
            });

      - name: Close issue after PR creation
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed',
            });
