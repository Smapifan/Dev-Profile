name: Create Profile from Issue

# Triggered when a "new-profile" label is applied to an issue.
# GitHub Issue Forms automatically apply the label declared in the template,
# so this fires as soon as a new-profile issue is opened.

on:
  issues:
    types: [labeled]

jobs:
  create-profile:
    # Only run for the "new-profile" label
    if: github.event.label.name == 'new-profile'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      # ── Parse issue body into /tmp/profile.yml ───────────────────────────
      - name: Parse issue body
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node .github/scripts/parse_issue.js
          if [ $? -ne 0 ]; then
            echo "parse_failed=true" >> $GITHUB_OUTPUT
          fi

      # ── Create profile files ─────────────────────────────────────────────
      - name: Create profile
        id: create
        if: steps.parse.outputs.parse_failed != 'true'
        env:
          PROFILE_KEY_SALT: ${{ secrets.PROFILE_KEY_SALT }}
        run: |
          OUTPUT=$(node .github/scripts/create_profile.js --yaml-file /tmp/profile.yml 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ $STATUS -ne 0 ]; then
            echo "create_failed=true" >> $GITHUB_OUTPUT
            echo "error_msg<<EOF" >> $GITHUB_OUTPUT
            echo "$OUTPUT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            # Extract the profile key: a 32-char hex string printed after the "PROFILE KEY" banner
            KEY=$(echo "$OUTPUT" | awk '/PROFILE KEY \(save/{found=1; next} found && /^[a-f0-9]{32}$/{print; exit}')
            echo "profile_key=$KEY" >> $GITHUB_OUTPUT
          fi

      # ── Commit the new profile ───────────────────────────────────────────
      - name: Commit new profile
        if: steps.create.outputs.create_failed != 'true' && steps.parse.outputs.parse_failed != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dev-Profile/ profiles.yml
          if git diff --cached --quiet; then
            echo "Nothing to commit – profile already exists."
          else
            git commit -m "feat: add profile from issue #${{ github.event.issue.number }}"
            git push
          fi

      # ── Comment with success + profile key ──────────────────────────────
      - name: Comment success
        if: steps.create.outputs.create_failed != 'true' && steps.parse.outputs.parse_failed != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const key = '${{ steps.create.outputs.profile_key }}';
            let body;
            if (key) {
              body = [
                '✅ **Your profile has been created!**',
                '',
                '> ⚠️ **Save your Profile Key – it will not be shown again!**',
                '',
                '```',
                key,
                '```',
                '',
                'You will need this key to edit your profile later.',
              ].join('\n');
            } else {
              body = [
                '✅ **Your profile has been created!**',
                '',
                'A client-provided key hash was used. Make sure you keep your private key safe.',
              ].join('\n');
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed',
            });

      # ── Comment with failure details ─────────────────────────────────────
      - name: Comment failure
        if: steps.create.outputs.create_failed == 'true' || steps.parse.outputs.parse_failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const errorMsg = `${{ steps.create.outputs.error_msg }}` || 'Could not parse the issue body.';
            const body = [
              '❌ **Profile creation failed.**',
              '',
              'Please check your input and re-submit by editing this issue or opening a new one.',
              '',
              '<details><summary>Error details</summary>',
              '',
              '```',
              errorMsg.slice(0, 2000),
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              labels: ['profile-error'],
            });
