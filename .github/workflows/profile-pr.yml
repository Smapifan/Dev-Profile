name: Auto-Profile-PR (no Token from User needed)

on:
  issues:
    types: [opened]
  workflow_dispatch:

jobs:
  create-profile-pr:
    if: |
      (startsWith(github.event.issue.title, '[Profile Submission]') ||
       startsWith(github.event.issue.title, '[Profile Update]')) &&
      contains(github.event.issue.body, '<!-- profile-yaml-b64 -->')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install js-yaml

      - name: Write issue body to file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # The client base64-encodes the YAML (marked with <!-- profile-yaml-b64 -->)
          # to protect profile data and avoid special-character issues in the API.
          # Decode if the marker is present; otherwise fall back to raw body.
          if printf '%s' "$ISSUE_BODY" | grep -qF '<!-- profile-yaml-b64 -->'; then
            printf '%s' "$ISSUE_BODY" | tail -n +2 | tr -d '[:space:]' | base64 --decode > /tmp/profile.yml
          else
            printf '%s' "$ISSUE_BODY" > /tmp/profile.yml
          fi

      - name: Determine mode and extract username
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # Detect update vs. new submission
          if [[ "$ISSUE_TITLE" == *"[Profile Update]"* ]]; then
            echo "UPDATE_FLAG=--update" >> "$GITHUB_ENV"
          else
            echo "UPDATE_FLAG=" >> "$GITHUB_ENV"
          fi

          # Extract username safely via Node.js
          USERNAME=$(node -e "
          const jsyaml = require('js-yaml');
          const fs = require('fs');
          try {
            const data = jsyaml.load(fs.readFileSync('/tmp/profile.yml', 'utf8')) || {};
            const u = String(data.username || '').trim();
            if (/^[a-zA-Z0-9_-]{1,40}$/.test(u)) process.stdout.write(u);
          } catch (e) { process.stderr.write(String(e.message) + '\n'); }
          ")

          if [ -z "$USERNAME" ]; then
            echo "ERROR: Could not parse a valid username from issue body." >&2
            exit 1
          fi
          echo "USERNAME=$USERNAME" >> "$GITHUB_ENV"

      - name: Create or update profile files
        run: node .github/scripts/create_profile.js --yaml-file /tmp/profile.yml ${{ env.UPDATE_FLAG }}

      - name: Create branch and commit
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Force-create/reset the branch so both new submissions and updates use the same
          # branch name. Any open PR for this profile will be updated automatically by
          # the force-push; review comments on the PR are preserved by GitHub.
          git checkout -B "profile/$USERNAME"
          git add "Dev-Profile/profiles/$USERNAME"
          ACTION_VERB="add"
          if [[ "$UPDATE_FLAG" == "--update" ]]; then ACTION_VERB="update"; fi
          git diff --cached --quiet || git commit -m "feat: ${ACTION_VERB} profile '$USERNAME' from issue #${{ github.event.issue.number }}"
          git push --force origin "profile/$USERNAME"

      - name: Open Pull Request
        id: open-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "profile/$USERNAME" \
            --title "feat: add/update profile '$USERNAME' (issue #${{ github.event.issue.number }})" \
            --body "Profile submitted via [Issue #${{ github.event.issue.number }}](${{ github.event.issue.html_url }}).

**Username:** \`$USERNAME\`") || \
          PR_URL=$(gh pr view "profile/$USERNAME" --json url -q .url)
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "PR: $PR_URL"

      - name: Auto-merge Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "profile/$USERNAME" --squash --delete-branch

      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            const username = process.env.USERNAME;
            const prUrl    = '${{ steps.open-pr.outputs.pr_url }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Profile created/updated!**\n\nA pull request was automatically opened and merged.\n\n**Username:** \`${username}\`\n${prUrl ? `**PR:** ${prUrl}\n` : ''}\nThank you for submitting!`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed',
            });
        env:
          USERNAME: ${{ env.USERNAME }}

      - name: Comment on issue if workflow failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '❌ **Profile submission failed.**',
                '',
                'The automated profile creation could not complete. Common reasons:',
                '- **Invalid username** — username must only contain letters, numbers, hyphens, and underscores (max 40 chars).',
                '- **Username already taken** — a profile with this username already exists.',
                '- **Missing required fields** — Username and Display Name are required.',
                '',
                'Please close this issue and open a new one with corrected information.',
                'If you believe this is a mistake, please contact a maintainer.',
              ].join('\n'),
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned',
            });
