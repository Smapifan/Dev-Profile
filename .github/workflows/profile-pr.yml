name: Auto-Profile-PR (no Token from User needed)

on:
  issues:
    types: [opened]
  workflow_dispatch:

jobs:
  create-profile-pr:
    if: |
      startsWith(github.event.issue.title, '[Profil Submission]') ||
      startsWith(github.event.issue.title, '[Profil Update]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install js-yaml

      - name: Write issue body to file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: printf '%s' "$ISSUE_BODY" > /tmp/profile.yml

      - name: Determine mode and extract username
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # Detect update vs. new submission
          if [[ "$ISSUE_TITLE" == *"[Profil Update]"* ]]; then
            echo "UPDATE_FLAG=--update" >> "$GITHUB_ENV"
          else
            echo "UPDATE_FLAG=" >> "$GITHUB_ENV"
          fi

          # Extract username safely via Node.js
          USERNAME=$(node -e "
          const jsyaml = require('js-yaml');
          const fs = require('fs');
          try {
            const data = jsyaml.load(fs.readFileSync('/tmp/profile.yml', 'utf8')) || {};
            const u = String(data.username || '').trim();
            if (/^[a-zA-Z0-9_-]{1,40}$/.test(u)) process.stdout.write(u);
          } catch (e) { process.stderr.write(String(e.message) + '\n'); }
          ")

          if [ -z "$USERNAME" ]; then
            echo "ERROR: Could not parse a valid username from issue body." >&2
            exit 1
          fi
          echo "USERNAME=$USERNAME" >> "$GITHUB_ENV"

      - name: Create or update profile files
        run: node .github/scripts/create_profile.js --yaml-file /tmp/profile.yml ${{ env.UPDATE_FLAG }}

      - name: Create branch and commit
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -B "profile/$USERNAME"
          git add "profiles/$USERNAME" profiles.yml
          git diff --cached --quiet || git commit -m "feat: add/update profile '$USERNAME' from issue #${{ github.event.issue.number }}"
          git push --force origin "profile/$USERNAME"

      - name: Open Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "profile/$USERNAME" \
            --title "feat: add/update profile '$USERNAME' (issue #${{ github.event.issue.number }})" \
            --body "Profile submitted via [Issue #${{ github.event.issue.number }}](${{ github.event.issue.html_url }}).

          **Username:** \`$USERNAME\`" \
          || echo "PR may already exist or could not be created — skipping."

