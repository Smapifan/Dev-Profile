name: Auto-Profile-PR (no Token from User needed)

on:
  issues:
    types: [opened]
  workflow_dispatch:

jobs:
  create-profile-pr:
    if: >
      startsWith(github.event.issue.title, '[Profil Submission]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create profile YAML from issue
        id: profile
        run: |
          echo "${{ github.event.issue.body }}" > profiles/profile-${{ github.event.issue.number }}.yml

      - name: Create new branch
        run: |
          git checkout -b profile/new-${{ github.event.issue.number }}
          git add profiles/profile-${{ github.event.issue.number }}.yml
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git commit -m "Add profile from issue #${{ github.event.issue.number }}"
          git push origin profile/new-${{ github.event.issue.number }}

      - name: Open Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          branch: profile/new-${{ github.event.issue.number }}
          title: "Profil-PR: Profile von Issue #${{ github.event.issue.number }}"
          body: |
            Dieses Profil stammt aus [Issue #${{ github.event.issue.number }}](${{ github.event.issue.html_url }}).
