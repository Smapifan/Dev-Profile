name: Create Profile PR

# Triggered via GitHub API dispatch (from the profile-creation form) or manually from the Actions UI.
# Creates a new branch with the submitted profile data and opens a Pull Request.

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Username (letters, numbers, hyphens, underscores; max 40 chars)"
        required: true
      name:
        description: "Display name"
        required: true
      bio:
        description: "Short bio (optional)"
        required: false
        default: ""
      skills:
        description: "Comma-separated list of skills (optional)"
        required: false
        default: ""
      socials:
        description: "JSON array of {type, url} objects for platform links (optional)"
        required: false
        default: "[]"
      language:
        description: "Preferred language code (en | de | es | fr | it | jp | cn)"
        required: false
        default: "en"
      key_hash:
        description: "SHA-256 hash of the profile key (generated client-side; never stored raw)"
        required: false
        default: ""

jobs:
  create-profile-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install js-yaml

      - name: Validate inputs
        id: validate
        run: |
          USERNAME="${{ github.event.inputs.username }}"
          if [[ ! "$USERNAME" =~ ^[a-zA-Z0-9_-]{1,40}$ ]]; then
            echo "::error::Invalid username: '$USERNAME'. Use only letters, numbers, hyphens and underscores (max 40 chars)."
            exit 1
          fi
          if [ -d "profiles/$USERNAME" ]; then
            echo "::error::Profile '$USERNAME' already exists."
            exit 1
          fi
          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"

      - name: Create profile files
        env:
          PROFILE_KEY_SALT: ${{ secrets.PROFILE_KEY_SALT }}
        run: |
          node .github/scripts/create_profile.js \
            --username "${{ steps.validate.outputs.username }}" \
            --name     "${{ github.event.inputs.name }}" \
            --bio      "${{ github.event.inputs.bio }}" \
            --skills   "${{ github.event.inputs.skills }}" \
            --socials  "${{ github.event.inputs.socials }}" \
            --language "${{ github.event.inputs.language }}" \
            --key-hash "${{ github.event.inputs.key_hash }}"

      - name: Create branch and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="${{ steps.validate.outputs.username }}"
          BRANCH="profile/${USERNAME}"
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%S)
          BRANCH_UNIQUE="${BRANCH}-${TIMESTAMP}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH_UNIQUE"
          git add "profiles/${USERNAME}/" profiles.yml
          git commit -m "feat: add profile '${USERNAME}'"
          git push origin "$BRANCH_UNIQUE"

          gh pr create \
            --base main \
            --head "$BRANCH_UNIQUE" \
            --title "feat: add profile '${USERNAME}'" \
            --body "$(cat <<EOF
## New Developer Profile: \`${USERNAME}\`

This Pull Request was automatically created from the [Dev-Profile form](https://smapifan.github.io/Dev-Profile/).

### Profile details
- **Username:** \`${USERNAME}\`
- **Display name:** ${{ github.event.inputs.name }}
- **Language:** ${{ github.event.inputs.language }}

### Checklist
- [ ] Username is unique and valid
- [ ] Bio and links look correct
- [ ] No sensitive data included

> ⚠️ The profile key hash is stored in \`profiles/${USERNAME}/profile.yml\`. The raw key was generated client-side and is never transmitted or stored.
EOF
)"

          echo "✅ PR created for profile '${USERNAME}' on branch '${BRANCH_UNIQUE}'."
