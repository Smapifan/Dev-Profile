name: Update Mod Caches

on:
  schedule:
    # Run every 2 hours
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      profile:
        description: "Specific profile username to update (leave empty for all)"
        required: false
        default: ""

jobs:
  update-mods:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install js-yaml

      - name: Update mod caches
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: node .github/scripts/update_mods.js

      - name: Index uploads
        run: node .github/scripts/process_uploads.js

      - name: Commit and push cache updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dev-Profile/*/mods_cache.yml Dev-Profile/*/uploads_index.yml
          git diff --cached --quiet || git commit -m "chore: update mod caches and upload indexes [skip ci]"
          git push
