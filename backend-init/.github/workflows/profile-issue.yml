name: Create Profile from Issue

# Triggered automatically when a "profile-submission" label is added to an issue.
# The label is applied by GitHub when a user opens an issue using the
# "New Developer Profile" issue form template.
#
# No Personal Access Token is required – the workflow runs entirely with the
# built-in GITHUB_TOKEN (github-actions[bot]).
# The profile is committed to a branch, a PR is opened, and the PR is
# automatically merged – no manual review required.
#
# Optional: set the secret FRONTEND_DISPATCH_TOKEN (a PAT with `repo` scope
# for the Dev-Profile frontend repo) to trigger a sync of the new profile
# into Smapifan/Dev-Profile immediately after merging.

on:
  issues:
    types: [labeled]

jobs:
  create-profile-pr:
    # Only run when the "profile-submission" label is applied
    if: github.event.label.name == 'profile-submission'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm install js-yaml

      - name: Parse issue body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            function extractField(label) {
              // GitHub issue forms render as "### Label\n\nvalue\n"
              const re = new RegExp(
                '###\\s+' + label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') +
                '\\s*\\n+([\\s\\S]*?)(?=\\n###|$)',
                'i'
              );
              const m = body.match(re);
              if (!m) return '';
              return m[1].replace(/<!--[\s\S]*?-->/g, '').trim();
            }

            const username     = extractField('Username');
            const displayName  = extractField('Display Name');
            const bio          = extractField('Bio').replace(/^_No response_$/i, '');
            const skills       = extractField('Skills').replace(/^_No response_$/i, '');
            const socialsRaw   = extractField('Platform Links').replace(/^_No response_$/i, '');
            const language     = extractField('Preferred Language').replace(/^_No response_$/i, '') || 'en';

            // Validate username
            if (!/^[a-zA-Z0-9_-]{1,40}$/.test(username)) {
              core.setFailed(`Invalid username: "${username}". Use only letters, numbers, hyphens and underscores (max 40 chars).`);
              return;
            }
            // Validate display name
            if (!displayName) {
              core.setFailed('Display Name is required.');
              return;
            }

            // Normalise socials: accept JSON array or newline-separated URLs
            let socialsJson = '[]';
            if (socialsRaw.startsWith('[')) {
              socialsJson = socialsRaw;
            } else if (socialsRaw) {
              const entries = socialsRaw
                .split('\n')
                .map(l => l.trim())
                .filter(Boolean)
                .map(url => JSON.stringify({ type: 'link', url }));
              socialsJson = '[' + entries.join(',') + ']';
            }

            core.setOutput('username',     username);
            core.setOutput('display_name', displayName);
            core.setOutput('bio',          bio);
            core.setOutput('skills',       skills);
            core.setOutput('socials',      socialsJson);
            core.setOutput('language',     language);

            console.log(`Parsed profile submission for username: ${username}`);

      - name: Validate username is unique
        id: validate
        run: |
          USERNAME="${{ steps.parse.outputs.username }}"
          if [ -z "$USERNAME" ]; then
            echo "::error::No username could be parsed from the issue body."
            exit 1
          fi
          if [ -d "Dev-Profile/$USERNAME" ]; then
            echo "::error::Profile '$USERNAME' already exists."
            exit 1
          fi
          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"

      - name: Create profile files
        env:
          PROFILE_KEY_SALT: ${{ secrets.PROFILE_KEY_SALT }}
        run: |
          node .github/scripts/create_profile.js \
            --username "${{ steps.validate.outputs.username }}" \
            --name     "${{ steps.parse.outputs.display_name }}" \
            --bio      "${{ steps.parse.outputs.bio }}" \
            --skills   "${{ steps.parse.outputs.skills }}" \
            --socials  "${{ steps.parse.outputs.socials }}" \
            --language "${{ steps.parse.outputs.language }}"

      - name: Create branch and commit
        run: |
          USERNAME="${{ steps.validate.outputs.username }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B "profile/$USERNAME"
          git add "Dev-Profile/${USERNAME}/" profiles.yml
          git diff --cached --quiet || git commit -m "feat: add profile '${USERNAME}' (via issue #${{ github.event.issue.number }})"
          git push --force origin "profile/$USERNAME"

      - name: Open Pull Request
        id: open-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="${{ steps.validate.outputs.username }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"

          PR_URL=$(gh pr create \
            --base main \
            --head "profile/$USERNAME" \
            --title "feat: add profile '$USERNAME' (issue #$ISSUE_NUMBER)" \
            --body "Profile submitted via [Issue #$ISSUE_NUMBER](${{ github.event.issue.html_url }}).

**Username:** \`$USERNAME\`") || \
          PR_URL=$(gh pr view "profile/$USERNAME" --json url -q .url)

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "PR: $PR_URL"

      - name: Auto-merge Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="${{ steps.validate.outputs.username }}"
          gh pr merge "profile/$USERNAME" --squash --delete-branch

      - name: Dispatch sync to Dev-Profile frontend (optional)
        # Only runs when the secret FRONTEND_DISPATCH_TOKEN is configured.
        # Set this secret to a PAT with `repo` scope for Smapifan/Dev-Profile.
        if: env.FRONTEND_DISPATCH_TOKEN != ''
        uses: actions/github-script@v7
        env:
          FRONTEND_DISPATCH_TOKEN: ${{ secrets.FRONTEND_DISPATCH_TOKEN }}
        with:
          github-token: ${{ secrets.FRONTEND_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'Smapifan',
              repo:  'Dev-Profile',
              event_type: 'profile-synced',
              client_payload: { username: '${{ steps.validate.outputs.username }}' },
            });
            console.log('Dispatched sync event to Smapifan/Dev-Profile');

      - name: Comment on issue with success
        uses: actions/github-script@v7
        with:
          script: |
            const username = '${{ steps.validate.outputs.username }}';
            const prUrl    = '${{ steps.open-pr.outputs.pr_url }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Profile created!**\n\nA pull request was automatically opened and merged by **github-actions[bot]**.\n\n**Username:** \`${username}\`\n${prUrl ? `**PR:** ${prUrl}\n` : ''}\nThank you for submitting, @${username}!`,
            });

      - name: Close issue after profile creation
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Comment on issue if workflow failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '❌ **Profile submission failed.**',
                '',
                'The automated profile creation could not complete. Common reasons:',
                '- **Invalid username** — username must only contain letters, numbers, hyphens, and underscores (max 40 chars).',
                '- **Username already taken** — a profile with this username already exists.',
                '- **Missing required fields** — Username and Display Name are required.',
                '',
                'Please close this issue and open a new one with corrected information.',
                'If you believe this is a mistake, please contact a maintainer.',
              ].join('\n'),
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned',
            });
