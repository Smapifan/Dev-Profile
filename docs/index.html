<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Mods Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .profiles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .profile-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .profile-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .profile-card:nth-child(2) .profile-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .profile-header h2 {
            font-size: 1.5em;
            margin-bottom: 5px;
        }
        
        .profile-header p {
            opacity: 0.9;
            font-size: 0.95em;
        }
        
        .profile-body {
            padding: 20px;
        }
        
        .profile-stat {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
        }
        
        .profile-stat:last-child {
            border-bottom: none;
        }
        
        .profile-stat-label {
            color: #666;
        }
        
        .profile-stat-value {
            font-weight: bold;
            color: #333;
        }
        
        .profile-link {
            display: block;
            margin-top: 15px;
            padding: 12px;
            background: #667eea;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .profile-card:nth-child(2) .profile-link {
            background: #f5576c;
        }
        
        .profile-link:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }
        
        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            padding: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Dev Mods Hub</h1>
            <p>Discover amazing mods from talented developers</p>
        </div>
        
        <div class="profiles-grid" id="profiles-grid">
            <!-- Profiles will be loaded here -->
        </div>
        
        <div class="footer">
            <p>🔄 Data updates every 15 minutes from Nexus Mods & CurseForge</p>
        </div>
    </div>
    
    <script>
        const profiles = [
            {
                username: 'Smapifan',
                title: 'Smapifan',
                description: 'Creative mod developer'
            },
            {
                username: 'MaggPlays',
                title: 'MaggPlays',
                description: 'Passionate mod creator'
            }
        ];
        
        async function loadProfiles() {
            const grid = document.getElementById('profiles-grid');
            
            for (const profile of profiles) {
                try {
                    const response = await fetch(`./${profile.username}/en.json`);
                    const data = await response.json();
                    
                    const nexusMods = data.nexus?.mods?.length || 0;
                    const curseforgeMods = data.curseforge?.mods?.length || 0;
                    
                    const card = document.createElement('div');
                    card.className = 'profile-card';
                    card.innerHTML = `
                        <div class="profile-header">
                            <h2>${profile.title}</h2>
                            <p>${profile.description}</p>
                        </div>
                        <div class="profile-body">
                            <div class="profile-stat">
                                <span class="profile-stat-label">Nexus Mods</span>
                                <span class="profile-stat-value">${nexusMods}</span>
                            </div>
                            <div class="profile-stat">
                                <span class="profile-stat-label">CurseForge</span>
                                <span class="profile-stat-value">${curseforgeMods}</span>
                            </div>
                            <div class="profile-stat">
                                <span class="profile-stat-label">Last Updated</span>
                                <span class="profile-stat-value">${new Date(data.lastUpdated).toLocaleDateString()}</span>
                            </div>
                            <a href="./${profile.username}/" class="profile-link">View Profile →</a>
                        </div>
                    `;
                    
                    grid.appendChild(card);
                } catch (error) {
                    console.error(`Error loading profile ${profile.username}:`, error);
                }
            }
        }
        
        loadProfiles();
    </script>
</body>
</html>
